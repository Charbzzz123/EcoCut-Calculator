<div
  #dropdownRoot
  class="select-dropdown"
  [class.select-dropdown--open]="menuOpen()"
  [style.--select-dropdown-max-height]="panelMaxHeight"
>
  <button
    type="button"
    class="select-dropdown__trigger"
    [disabled]="isTriggerDisabled()"
    [attr.aria-expanded]="menuOpen()"
    [attr.aria-label]="ariaLabel"
    aria-haspopup="listbox"
    (click)="toggleMenu()"
  >
    <span>{{ selectedLabel() }}</span>
    <span class="select-dropdown__chevron" aria-hidden="true">⌄</span>
  </button>

  @if (shouldRenderMenu() && hasOptions()) {
    <ul
      class="select-dropdown__menu"
      [class.select-dropdown__menu--open]="menuOpen()"
      [class.select-dropdown__menu--closing]="menuClosing()"
      role="listbox"
      [attr.aria-label]="ariaLabel"
    >
      @for (option of options; track option.value) {
        <li>
          <button
            type="button"
            class="select-dropdown__option"
            [class.select-dropdown__option--active]="isActive(option)"
            [disabled]="option.disabled ?? false"
            (click)="selectOption(option)"
          >
            {{ option.label }}
          </button>
        </li>
      }
    </ul>
  }
</div>
