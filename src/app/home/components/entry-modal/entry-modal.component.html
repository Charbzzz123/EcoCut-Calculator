@if (open) {
  <div class="modal-backdrop">
    <div class="modal-shell" role="dialog" aria-modal="true" [attr.aria-label]="headlineText">
      <header class="modal-header">
        <div>
          <p class="eyebrow">{{ eyebrowText }}</p>
          <h2>{{ headlineText }}</h2>
          <span class="modal-subcopy">{{ subcopyText }}</span>
        </div>
        <button type="button" class="icon-btn" (click)="closeModal()" aria-label="Close dialog">&times;</button>
      </header>

      <form class="content" [formGroup]="form" (ngSubmit)="submitEntry()">
      <app-entry-details-form
        [form]="form"
        [variant]="variant"
        [hedgeSelectionError]="hedgeSelectionError()"
        [hedges]="hedges"
        [hedgePoints]="hedgePoints"
        [panelState]="panelState"
        [panelPosition]="panelPosition"
        [panelError]="panelError"
        [panelFloats]="panelFloatsFn"
        [trimHasCustomSelections]="trimHasCustomSelectionsFn"
        [trimPresetSelected]="trimPresetSelectedFn"
        [hasSavedConfig]="hasSavedConfigFn"
        [getHedgeState]="getHedgeStateFn"
        [handlers]="detailsHandlers"
        (canvasHostChange)="onCanvasHostChange($event)"
      ></app-entry-details-form>

      @if (requiresCalendar()) {
        <app-entry-schedule-section [viewModel]="scheduleViewModel" [handlers]="scheduleHandlers"></app-entry-schedule-section>
      }
        <app-entry-modal-footer
          [primaryLabel]="primaryLabelText"
          [primaryDisabled]="isPrimaryDisabled()"
          (dismiss)="closeModal()"
        ></app-entry-modal-footer>
      </form>
    </div>
  </div>
}
