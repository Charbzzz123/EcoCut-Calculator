<section class="home-shell">
  <article class="home-hero" aria-labelledby="home-hero-heading">
    <div class="hero-brand-row">
      <a routerLink="/" class="brand-link brand-link--logo" aria-label="Back to EcoCut home via logo">
        <img src="assets/brand/eco-logo.png" alt="EcoCut logo" />
      </a>
      <a routerLink="/" class="brand-link brand-link--mascot" aria-label="Back to EcoCut home via mascot">
        <img
          src="assets/brand/eco-mascot.png"
          alt="EcoCut mascot"
          loading="lazy"
          onerror="this.src='assets/brand/mascot-placeholder.svg'; this.onerror=null;"
        />
      </a>
    </div>

    <div class="hero-header">
      <div class="hero-copy">
        <p class="eyebrow">Operations snapshot</p>
        <h1 id="home-hero-heading">EcoCut Dashboard</h1>
        <p>Review performance, jump into the next quote, or adjust your team in seconds.</p>
        <div class="hero-cta">
          <button type="button" class="primary" (click)="facade.startNewJob()">New Job</button>
          <span class="hero-cta__hint">Speed-first workflow • Dark Evergreen theme</span>
        </div>
      </div>
    </div>

    <app-hero-metrics [metrics]="heroMetrics()" />
  </article>

  <article class="home-actions" aria-label="Quick actions">
    <app-quick-actions
      [actions]="quickActions()"
      (actionSelected)="onQuickAction($event)"
    />
  </article>

  <button type="button" class="floating-cta" (click)="facade.startNewJob()">
    + New Job
  </button>
</section>
