name: CI

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:

jobs:
  frontend:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test (CI)
        run: npm run test:ci
      - name: Build
        run: npm run build

  server:
    name: Server Check
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint & Test (npm run check)
        run: npm run check
